name = "ai-assessment-platform"
main = "src/api/router.ts"
compatibility_date = "2025-01-01"

# Gemini APIキーは `wrangler secret put GEMINI_API_KEY` で登録すること。
# Cloudflareダッシュボードまたは `wrangler kv namespace create ASSIGNMENT_KV` で
# 実際のKV Namespaceを作成し、id / preview_id を置き換えること。
[[kv_namespaces]]
binding = "ASSIGNMENT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"
